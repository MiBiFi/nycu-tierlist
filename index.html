<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYCU 實驗室 Tier List</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f0e0e;
  --panel: #181616;
  --border: #2e2b2b;
  --text: #f0ece8;
  --dim: #6b6560;
  --t0-bg: #1a0a0a; --t0-accent: #ff2d55;
  --t1-bg: #1a0f00; --t1-accent: #ff9f0a;
  --t2-bg: #0d1a0a; --t2-accent: #30d158;
  --t3-bg: #0a0d1a; --t3-accent: #636af3;
  --t4-bg: #14080f; --t4-accent: #bf5af2;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans TC', sans-serif;
  min-height: 100vh;
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 999; opacity: 0.4;
}

.wrap { max-width: 780px; margin: 0 auto; padding: 36px 18px 80px; }

/* ── AUTH GATE ── */
#authGate {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100vh; gap: 24px; text-align: center;
  padding: 24px;
}
#authGate h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(48px, 12vw, 80px);
  line-height: 0.9;
}
#authGate h1 span { display: block; }
.h1-hot  { color: #ff2d55; }
.h1-mid1 { color: #ff9f0a; }
.h1-mid2 { color: #30d158; }
.h1-npc  { color: #636af3; }
.h1-cold { color: #bf5af2; }

#authGate p { color: var(--dim); font-size: 14px; max-width: 320px; line-height: 1.7; }
#authGate .domain-badge {
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 20px;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.05em;
  color: #30d158;
}

.btn-google {
  display: flex; align-items: center; gap: 12px;
  background: var(--text); color: var(--bg);
  border: none; border-radius: 8px;
  padding: 13px 28px;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 15px; font-weight: 700;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
}
.btn-google:hover { opacity: 0.88; transform: translateY(-1px); }
.btn-google:active { transform: translateY(0); }
.btn-google svg { width: 20px; height: 20px; flex-shrink: 0; }

/* ── MAIN APP ── */
#app { display: none; }

/* ── HEADER ── */
header { margin-bottom: 40px; }
.eyebrow {
  font-size: 11px; letter-spacing: 0.2em; color: var(--dim);
  text-transform: uppercase; margin-bottom: 8px;
}
h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(52px, 12vw, 88px);
  line-height: 0.9; letter-spacing: 0.03em;
}
h1 span { display: block; }

.rule-bar {
  margin-top: 18px;
  display: flex; gap: 18px; flex-wrap: wrap;
  font-size: 12px; color: var(--dim);
  border-top: 1px solid var(--border);
  padding-top: 14px;
  align-items: center; justify-content: space-between;
}
.rule-items { display: flex; gap: 18px; flex-wrap: wrap; }
.rule-item { display: flex; align-items: center; gap: 6px; }
.rule-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text); opacity: 0.4; }

/* user info */
.user-info {
  display: flex; align-items: center; gap: 10px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 12px;
  font-size: 12px;
}
.user-avatar {
  width: 24px; height: 24px; border-radius: 50%;
  object-fit: cover;
}
.user-email { color: var(--text); font-weight: 700; max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.btn-signout {
  background: none; border: none; color: var(--dim);
  font-size: 11px; cursor: pointer; text-decoration: underline;
  font-family: 'Noto Sans TC', sans-serif;
}
.btn-signout:hover { color: var(--text); }

/* ── TIER LIST ── */
.tiers { display: flex; flex-direction: column; gap: 4px; margin-bottom: 32px; }
.tier-row {
  display: flex; border-radius: 8px; overflow: hidden;
  border: 1px solid var(--border); min-height: 68px;
  transition: box-shadow 0.2s;
}
.tier-row:hover { box-shadow: 0 0 0 1px rgba(255,255,255,0.06); }
.tier-label {
  width: 88px; min-width: 88px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px; letter-spacing: 0.05em; flex-shrink: 0;
}
.tier-content {
  flex: 1; display: flex; align-items: center;
  flex-wrap: wrap; gap: 8px; padding: 12px;
  background: var(--panel);
  border-left: 1px solid var(--border);
}
.tier-empty { color: var(--dim); font-size: 12px; font-style: italic; }

.tier-0 .tier-label { background: var(--t0-bg); color: var(--t0-accent); }
.tier-1 .tier-label { background: var(--t1-bg); color: var(--t1-accent); }
.tier-2 .tier-label { background: var(--t2-bg); color: var(--t2-accent); }
.tier-3 .tier-label { background: var(--t3-bg); color: var(--t3-accent); }
.tier-4 .tier-label { background: var(--t4-bg); color: var(--t4-accent); }

/* ── LAB CHIPS ── */
.lab-chip {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 6px; padding: 6px 10px;
  font-size: 13px; font-weight: 700;
  animation: popIn 0.25s cubic-bezier(.34,1.56,.64,1) both;
  cursor: default; transition: background 0.15s;
}
@keyframes popIn {
  from { opacity:0; transform: scale(0.7); }
  to   { opacity:1; transform: scale(1); }
}
.lab-chip:hover { background: rgba(255,255,255,0.1); }
.chip-actions { display: flex; flex-direction: column; gap: 2px; opacity: 0; transition: opacity 0.15s; }
.lab-chip:hover .chip-actions { opacity: 1; }
.chip-btn {
  background: none; border: none; color: var(--dim);
  cursor: pointer; font-size: 10px; line-height: 1;
  padding: 1px 2px; transition: color 0.1s;
}
.chip-btn:hover { color: var(--text); }
.chip-btn.up:hover { color: #ff9f0a; }
.chip-btn.dn:hover { color: #636af3; }
.chip-btn:disabled { opacity: 0.2; cursor: default; pointer-events: none; }

/* ── ACTION PANEL ── */
.action-panel {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 12px; padding: 22px; margin-bottom: 28px;
}
.action-panel h2 {
  font-size: 13px; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--dim); margin-bottom: 16px;
}

/* used banner */
.used-banner {
  display: none;
  background: rgba(99,106,243,0.12);
  border: 1px solid rgba(99,106,243,0.35);
  border-radius: 8px; padding: 14px 16px;
  font-size: 13px; color: #a0a6f8; line-height: 1.6;
  text-align: center;
}
.used-banner.show { display: block; }

.action-tabs { display: flex; gap: 6px; margin-bottom: 16px; }
.tab-btn {
  flex: 1; padding: 8px;
  background: #221f1f; border: 1px solid var(--border);
  border-radius: 6px; color: var(--dim);
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 12px; font-weight: 700;
  cursor: pointer; transition: all 0.15s;
}
.tab-btn.active {
  background: rgba(255,255,255,0.08);
  border-color: rgba(255,255,255,0.25); color: var(--text);
}
.tab-btn:disabled { opacity: 0.35; cursor: default; }

.field-group { display: none; }
.field-group.active { display: flex; gap: 8px; flex-wrap: wrap; width: 100%; }
.field { display: flex; flex-direction: column; }
.field.grow { flex: 1; min-width: 120px; }
.field label { font-size: 12px; color: var(--dim); margin-bottom: 4px; display: block; }

input, select {
  background: #221f1f; border: 1px solid var(--border);
  color: var(--text); border-radius: 6px;
  padding: 9px 12px;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 13px; outline: none;
  transition: border-color 0.15s; width: 100%;
}
input:focus, select:focus { border-color: rgba(255,255,255,0.3); }
input::placeholder { color: var(--dim); }
select option { background: #221f1f; }

.btn-submit {
  width: 100%; padding: 11px; margin-top: 14px;
  background: var(--text); color: var(--bg);
  border: none; border-radius: 6px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px; letter-spacing: 0.1em;
  cursor: pointer; transition: opacity 0.15s, transform 0.1s;
}
.btn-submit:hover { opacity: 0.88; transform: translateY(-1px); }
.btn-submit:active { transform: translateY(0); }
.btn-submit:disabled { opacity: 0.35; cursor: default; transform: none; }

/* ── LOG ── */
.log-section { margin-top: 28px; }
.log-header {
  font-size: 11px; color: var(--dim);
  letter-spacing: 0.15em; text-transform: uppercase;
  margin-bottom: 10px;
  display: flex; justify-content: space-between; align-items: center;
}
.log-list {
  display: flex; flex-direction: column; gap: 4px;
  max-height: 220px; overflow-y: auto;
}
.log-item {
  font-size: 12px; color: var(--dim);
  padding: 6px 10px; background: var(--panel);
  border-radius: 4px; border-left: 2px solid var(--border);
  display: flex; justify-content: space-between;
}
.log-item .log-who { color: var(--text); font-weight: 700; }
.log-item .log-time { font-size: 10px; opacity: 0.5; }

/* ── LOADING ── */
.loading-overlay {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; flex-direction: column; gap: 16px;
  transition: opacity 0.3s;
}
.loading-overlay.hide { opacity: 0; pointer-events: none; }
.spinner {
  width: 32px; height: 32px;
  border: 2px solid var(--border);
  border-top-color: var(--text);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-overlay p { font-size: 13px; color: var(--dim); }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(16px);
  padding: 10px 22px; border-radius: 8px;
  font-size: 13px; font-weight: 700;
  opacity: 0; pointer-events: none;
  transition: all 0.22s; z-index: 1000; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.ok  { background: #30d158; color: #000; }
.toast.err { background: #ff2d55; color: #fff; }
</style>
</head>
<body>

<!-- LOADING -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <p>載入中…</p>
</div>

<!-- AUTH GATE -->
<div id="authGate">
  <h1>
    <span class="h1-hot">夯</span>
    <span class="h1-mid1">頂級</span>
    <span class="h1-mid2">人上人</span>
    <span class="h1-npc">NPC</span>
    <span class="h1-cold">拉完了</span>
  </h1>
  <p>NYCU 實驗室 Tier List<br>需要用學校 Google 帳號登入才能參與</p>
  <div class="domain-badge">@nycu.edu.tw　或　@g2.nctu.edu.tw</div>
  <button class="btn-google" id="btnLogin">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    用 NYCU Google 帳號登入
  </button>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="wrap">

    <header>
      <div class="eyebrow">NYCU 實驗室 Tier List · 眾包評分</div>
      <h1>
        <span class="h1-hot">夯</span>
        <span class="h1-mid1">頂級</span>
        <span class="h1-mid2">人上人</span>
        <span class="h1-npc">NPC</span>
        <span class="h1-cold">拉完了</span>
      </h1>
      <div class="rule-bar">
        <div class="rule-items">
          <div class="rule-item"><div class="rule-dot"></div>每人只能操作一次</div>
          <div class="rule-item"><div class="rule-dot"></div>新增一個 lab 或移動一格</div>
          <div class="rule-item"><div class="rule-dot"></div>需 @nycu.edu.tw 帳號</div>
        </div>
        <div class="user-info" id="userInfo"></div>
      </div>
    </header>

    <!-- TIER LIST -->
    <div class="tiers" id="tierList"></div>

    <!-- ACTION PANEL -->
    <div class="action-panel">
      <h2>你的操作</h2>

      <div class="used-banner" id="usedBanner">
        你已經操作過了！每個帳號只能操作一次 🙅<br>
        <span style="font-size:11px;opacity:0.7">想改變心意？找管理員協助</span>
      </div>

      <div id="actionForm">
        <div class="action-tabs">
          <button class="tab-btn active" id="tabAdd" onclick="switchTab('add')">➕ 新增 Lab</button>
          <button class="tab-btn" id="tabMove" onclick="switchTab('move')">⬆⬇ 移動 Lab</button>
        </div>

        <!-- ADD -->
        <div class="field-group active" id="groupAdd">
          <div class="field grow">
            <label>Lab 名稱</label>
            <input type="text" id="newLabName" placeholder="e.g. msedalab" maxlength="30">
          </div>
          <div class="field" style="flex:0 0 130px">
            <label>放入 Tier</label>
            <select id="addTier"></select>
          </div>
        </div>

        <!-- MOVE -->
        <div class="field-group" id="groupMove">
          <div class="field grow">
            <label>選擇 Lab</label>
            <select id="moveLab"></select>
          </div>
          <div class="field" style="flex:0 0 120px">
            <label>方向</label>
            <select id="moveDir">
              <option value="up">⬆ 上移一格</option>
              <option value="down">⬇ 下移一格</option>
            </select>
          </div>
        </div>

        <button class="btn-submit" id="btnSubmit" onclick="doAction()">確認送出</button>
      </div>
    </div>

    <!-- LOG -->
    <div class="log-section">
      <div class="log-header">
        <span>操作記錄</span>
        <span id="onlineCount" style="color:var(--dim);font-size:11px"></span>
      </div>
      <div class="log-list" id="logList"></div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<!-- ══════════════════════════════════════════════
     🔥 Firebase SDK  (compat v9)
     把下面三行換成你自己 Firebase 專案的 config
     ══════════════════════════════════════════════ -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
// ════════════════════════════════════════════════
// ⚙️  換成你自己的 Firebase 設定
// ════════════════════════════════════════════════
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyAWyv1cWOs70PoGdwPXKxArvhNpEpYR3Hc",
  authDomain:        "nycu-ee-lab.firebaseapp.com",
  projectId:         "nycu-ee-lab",
  storageBucket:     "nycu-ee-lab.firebasestorage.app",
  messagingSenderId: "946149096928",
  appId:             "1:946149096928:web:4f86e46c0756ba1788bf85"
};

// 允許的信箱網域（小寫）
const ALLOWED_DOMAINS = ['nycu.edu.tw', 'g2.nctu.edu.tw'];

// ════════════════════════════════════════════════
firebase.initializeApp(FIREBASE_CONFIG);
const auth = firebase.auth();
const db   = firebase.firestore();

const TIER_NAMES = ['夯', '頂級', '人上人', 'NPC', '拉完了'];
let currentUser  = null;
let hasActed     = false;
let activeTab    = 'add';
let unsubTiers   = null;
let unsubLog     = null;

// ── refs ──
const tiersDoc  = () => db.collection('tierlist').doc('main');
const logsCol   = () => db.collection('logs');
const usersCol  = () => db.collection('users');

// ── DOM ──
const $  = id => document.getElementById(id);
const loading   = $('loadingOverlay');
const authGate  = $('authGate');
const app       = $('app');
const usedBanner= $('usedBanner');
const actionForm= $('actionForm');

// ════════════════════════════════════════════════
// AUTH
// ════════════════════════════════════════════════
$('btnLogin').onclick = async () => {
  const provider = new firebase.auth.GoogleAuthProvider();
  provider.setCustomParameters({ hd: 'nycu.edu.tw' });  // hint, not enforced alone
  try {
    await auth.signInWithPopup(provider);
  } catch (e) {
    toast('登入失敗：' + e.message, 'err');
  }
};

auth.onAuthStateChanged(async user => {
  if (!user) {
    showAuthGate();
    hideLoading();
    return;
  }

  // Domain check
  const email  = user.email || '';
  const domain = email.split('@')[1]?.toLowerCase() || '';
  if (!ALLOWED_DOMAINS.includes(domain)) {
    await auth.signOut();
    toast(`只允許 NYCU 帳號登入（你的信箱：${email}）`, 'err');
    showAuthGate();
    hideLoading();
    return;
  }

  currentUser = user;
  await initApp();
  hideLoading();
});

async function initApp() {
  // Check if already acted
  const userDoc = await usersCol().doc(currentUser.uid).get();
  hasActed = userDoc.exists && userDoc.data().acted === true;

  // Render user info
  renderUserInfo();

  // Show app
  authGate.style.display = 'none';
  app.style.display = 'block';

  // Subscribe to real-time updates
  subscribeData();

  // Render action state
  renderActionState();
}

function renderUserInfo() {
  $('userInfo').innerHTML = `
    <span class="user-email">已登入 ✓</span>
    <button class="btn-signout" onclick="signOut()">登出</button>
  `;
}

async function signOut() {
  if (unsubTiers) unsubTiers();
  if (unsubLog)   unsubLog();
  await auth.signOut();
  app.style.display = 'none';
  showAuthGate();
}

function showAuthGate() {
  authGate.style.display = 'flex';
}

// ════════════════════════════════════════════════
// REAL-TIME DATA
// ════════════════════════════════════════════════
function subscribeData() {
  // Tier list
  unsubTiers = tiersDoc().onSnapshot(snap => {
    const data = snap.data() || { tiers: [[],[],[],[],[]] };
    renderTiers(data.tiers);
    populateSelects(data.tiers);
  });

  // Log (latest 50)
  unsubLog = logsCol()
    .orderBy('ts', 'desc')
    .limit(50)
    .onSnapshot(snap => {
      renderLog(snap.docs.map(d => d.data()));
    });
}

// ════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════
function renderTiers(tiers) {
  $('tierList').innerHTML = tiers.map((labs, ti) => `
    <div class="tier-row tier-${ti}">
      <div class="tier-label">${TIER_NAMES[ti]}</div>
      <div class="tier-content">
        ${labs.length === 0
          ? '<span class="tier-empty">（空）</span>'
          : labs.map(lab => chipHtml(lab, ti, tiers)).join('')}
      </div>
    </div>
  `).join('');
}

function chipHtml(lab, ti, tiers) {
  const canUp   = ti > 0;
  const canDown = ti < TIER_NAMES.length - 1;
  return `
    <div class="lab-chip">
      ${escHtml(lab)}
      <div class="chip-actions">
        <button class="chip-btn up" ${canUp?'':'disabled'}
          onclick="quickMove('${escAttr(lab)}', -1, ${JSON.stringify(tiers).replace(/"/g,'&quot;')})" title="上移">▲</button>
        <button class="chip-btn dn" ${canDown?'':'disabled'}
          onclick="quickMove('${escAttr(lab)}', 1, ${JSON.stringify(tiers).replace(/"/g,'&quot;')})" title="下移">▼</button>
      </div>
    </div>`;
}

function renderLog(logs) {
  const el = $('logList');
  if (!logs.length) {
    el.innerHTML = '<div class="log-item" style="color:var(--dim)">尚無記錄</div>';
    return;
  }
  el.innerHTML = logs.map(l => `
    <div class="log-item">
      <span>${escHtml(l.desc)}</span>
      <span class="log-time">${l.timeStr || ''}</span>
    </div>
  `).join('');
}

function renderActionState() {
  if (hasActed) {
    usedBanner.classList.add('show');
    actionForm.style.display = 'none';
  } else {
    usedBanner.classList.remove('show');
    actionForm.style.display = 'block';
  }
}

function populateSelects(tiers) {
  const addTier = $('addTier');
  addTier.innerHTML = TIER_NAMES.map((n,i)=>`<option value="${i}">${n}</option>`).join('');

  const moveLab = $('moveLab');
  const allLabs = tiers.flatMap((labs, ti) => labs.map(l => ({ name: l, ti })));
  moveLab.innerHTML = allLabs.length === 0
    ? '<option disabled>（還沒有 lab）</option>'
    : allLabs.map(({ name, ti }) =>
        `<option value="${escAttr(name)}">[${TIER_NAMES[ti]}] ${escHtml(name)}</option>`
      ).join('');
}

// ════════════════════════════════════════════════
// ACTIONS
// ════════════════════════════════════════════════
function switchTab(tab) {
  activeTab = tab;
  $('tabAdd').classList.toggle('active', tab==='add');
  $('tabMove').classList.toggle('active', tab==='move');
  $('groupAdd').classList.toggle('active', tab==='add');
  $('groupMove').classList.toggle('active', tab==='move');
}

async function doAction() {
  if (hasActed) { toast('你已經操作過了！', 'err'); return; }
  if (!currentUser) { toast('請先登入', 'err'); return; }

  $('btnSubmit').disabled = true;

  try {
    if (activeTab === 'add') await doAdd();
    else await doMove();
  } catch(e) {
    toast('操作失敗：' + e.message, 'err');
    $('btnSubmit').disabled = false;
  }
}

async function doAdd() {
  const name = $('newLabName').value.trim();
  const ti   = parseInt($('addTier').value);
  if (!name) { toast('請輸入 lab 名稱', 'err'); $('btnSubmit').disabled=false; return; }

  // Transaction: check duplicate + append
  await db.runTransaction(async tx => {
    const snap = await tx.get(tiersDoc());
    const data = snap.exists ? snap.data() : { tiers: [[],[],[],[],[]] };
    const tiers = data.tiers || [[],[],[],[],[]];

    const allLabs = tiers.flat().map(l => l.toLowerCase());
    if (allLabs.includes(name.toLowerCase())) throw new Error('這個 lab 已經在表上了！');

    tiers[ti] = [...(tiers[ti] || []), name];
    tx.set(tiersDoc(), { tiers });

    // Mark user
    tx.set(usersCol().doc(currentUser.uid), { acted: true, email: currentUser.email, ts: firebase.firestore.FieldValue.serverTimestamp() });
  });

  await writeLog(`新增「${name}」到【${TIER_NAMES[ti]}】`);

  hasActed = true;
  renderActionState();
  $('newLabName').value = '';
  toast(`✅ 已新增「${name}」到 ${TIER_NAMES[ti]}`, 'ok');
}

async function doMove() {
  const labName = $('moveLab').value;
  const dir     = $('moveDir').value;
  if (!labName) { toast('請選擇要移動的 lab', 'err'); $('btnSubmit').disabled=false; return; }

  await db.runTransaction(async tx => {
    const snap = await tx.get(tiersDoc());
    const data = snap.exists ? snap.data() : { tiers: [[],[],[],[],[]] };
    const tiers = data.tiers || [[],[],[],[],[]];

    let fromTi = -1;
    tiers.forEach((t,i) => { if (t.includes(labName)) fromTi = i; });
    if (fromTi < 0) throw new Error('找不到這個 lab');

    const toTi = fromTi + (dir === 'up' ? -1 : 1);
    if (toTi < 0) throw new Error(`「${labName}」已經在最頂了！`);
    if (toTi >= TIER_NAMES.length) throw new Error(`「${labName}」已經在最底了！`);

    tiers[fromTi] = tiers[fromTi].filter(l => l !== labName);
    tiers[toTi]   = [...tiers[toTi], labName];
    tx.set(tiersDoc(), { tiers });

    tx.set(usersCol().doc(currentUser.uid), { acted: true, email: currentUser.email, ts: firebase.firestore.FieldValue.serverTimestamp() });

    // stash for log (can't await inside tx after write)
    tx._logDesc = `將「${labName}」從【${TIER_NAMES[fromTi]}】${toTi < fromTi ? '上移' : '下移'}到【${TIER_NAMES[toTi]}】`;
    tx._toTi    = toTi;
    tx._fromTi  = fromTi;
  });

  const toTi = dir === 'up'
    ? (()=>{ let f=-1; return f; })()  // re-derive below
    : 0;

  // Re-derive toTi for toast (simpler)
  const snap2  = await tiersDoc().get();
  const tiers2 = snap2.data()?.tiers || [];
  let newTi = -1;
  tiers2.forEach((t,i) => { if (t.includes(labName)) newTi = i; });

  await writeLog(`將「${labName}」移動到【${newTi >= 0 ? TIER_NAMES[newTi] : '?'}】`);

  hasActed = true;
  renderActionState();
  toast(`✅ 移動成功！`, 'ok');
}

// Quick move from chip buttons — also costs the user's one action
async function quickMove(lab, delta, tiersSnapshot) {
  if (hasActed) { toast('你已經操作過了！', 'err'); return; }
  if (!currentUser) { toast('請先登入', 'err'); return; }

  // find current tier from snapshot passed in
  let fromTi = -1;
  tiersSnapshot.forEach((t, i) => { if (t.includes(lab)) fromTi = i; });
  if (fromTi < 0) return;
  const toTi = fromTi + delta;
  if (toTi < 0 || toTi >= TIER_NAMES.length) return;

  try {
    await db.runTransaction(async tx => {
      const snap = await tx.get(tiersDoc());
      const data = snap.exists ? snap.data() : { tiers: [[],[],[],[],[]] };
      const tiers = data.tiers;

      let ft = -1;
      tiers.forEach((t,i) => { if (t.includes(lab)) ft = i; });
      if (ft < 0) throw new Error('找不到');

      const tt = ft + delta;
      if (tt < 0 || tt >= TIER_NAMES.length) throw new Error('邊界');

      tiers[ft] = tiers[ft].filter(l => l !== lab);
      tiers[tt] = [...tiers[tt], lab];
      tx.set(tiersDoc(), { tiers });
      tx.set(usersCol().doc(currentUser.uid), { acted: true, email: currentUser.email, ts: firebase.firestore.FieldValue.serverTimestamp() });
    });

    await writeLog(`將「${lab}」${delta < 0 ? '上移' : '下移'}一格`);
    hasActed = true;
    renderActionState();
    toast(`✅ 已移動「${lab}」`, 'ok');
  } catch(e) {
    toast('移動失敗：' + e.message, 'err');
  }
}

async function writeLog(desc) {
  const now = new Date();
  const timeStr = now.toLocaleTimeString('zh-TW', { hour:'2-digit', minute:'2-digit' });
  const who = '匿名';
  await logsCol().add({
    who, desc, timeStr,
    ts: firebase.firestore.FieldValue.serverTimestamp(),
    uid: currentUser.uid
  });
}

// ── UTILS ──
function toast(msg, type='ok') {
  const el = $('toast');
  el.textContent = msg;
  el.className = `toast ${type} show`;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2400);
}
function hideLoading() {
  loading.classList.add('hide');
  setTimeout(() => loading.style.display = 'none', 350);
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escAttr(s) {
  return String(s).replace(/'/g, "\\'");
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !hasActed) doAction();
});
</script>
</body>
